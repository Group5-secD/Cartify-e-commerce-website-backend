<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Registration Frontend</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 40px; text-align: center;">
    <h2>Test Registration Output</h2>
    
    <div style="margin: 0 auto; display: inline-block; text-align: left; background: #f2f2f2; padding: 20px; border-radius: 8px; width: 300px;">
        <form id="regForm" enctype="multipart/form-data">
            <label>Username:</label><br>
            <input type="text" name="username" value="testuser123" style="width: 100%; margin-bottom: 10px;" required><br>

            <label>Email:</label><br>
            <input type="email" name="email" value="testuser123@example.com" style="width: 100%; margin-bottom: 10px;" required><br>

            <label>Password:</label><br>
            <input type="password" name="password" value="secret12345" style="width: 100%; margin-bottom: 10px;" required><br>

            <label>Profile Picture:</label><br>
            <input type="file" name="profile_picture" id="profile_picture" style="width: 100%; margin-bottom: 15px;"><br>

            <button type="submit" style="width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">Register</button>
        </form>
    </div>

    <div id="output" style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; display: none; background: #e8f4fd;"></div>

    <script>
        document.getElementById('regForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            
            // Generate a dummy image file for testing
            if(!document.getElementById('profile_picture').files.length) {
                const canvas = document.createElement('canvas');
                canvas.width = 10; canvas.height = 10;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'blue';
                ctx.fillRect(0,0,10,10);
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                formData.set('profile_picture', blob, 'test.png');
            }

            const response = await fetch('/api/auth/register.php', {
                method: 'POST',
                body: formData
            });

            const result = await response.text();
            document.getElementById('output').style.display = 'block';
            document.getElementById('output').innerText = 'Server Response:\n' + result;
        });
    </script>
</body>
</html>
